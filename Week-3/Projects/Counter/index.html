<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body style="background: linear-gradient(to right,rgb(7, 5, 31),rgb(185, 189, 191));">
  <div id="container"  >
    <div id="counter" style="background-color: lightblue; height: 100px; width: 200px; text-align: center; position: absolute; left: 45vw; top: 40vh;">
      <h3 style="padding: 30px ; font-family: 'Courier New', Courier, monospace;">Counter : 0</h3>
    </div>
    <button type="button" id="dec" style="padding: 20px; border-radius: 10px; width: 200px;position: absolute; top: 55vh; left: 38vw; background: linear-gradient(to right,rgb(78, 78, 166),lightblue);" >Decrease</button>
    <button type="button" id="inc" style="padding: 20px; border-radius: 10px; width: 200px; position: absolute; top: 55vh; left: 52vw; background: linear-gradient(to right,rgb(78, 78, 166),lightblue);" >Increase</button>
  </div>
  <script src="./script.js"></script>
